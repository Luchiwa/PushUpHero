name: Bug report
description: Report a defect or unexpected behavior in PushUpHero
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
      placeholder: "When I start a squat workout, the rep counter freezes after the third rep."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the app and sign in
        2. Start a workout with ...
        3. Perform ...
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: The rep counter should increment on every completed rep.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: The counter stays at 3 and the coach stops reacting.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: How badly does this affect usage?
      options:
        - "P0 — Critical (blocks core flow, data loss)"
        - "P1 — High (major feature broken, no workaround)"
        - "P2 — Medium (workaround exists)"
        - "P3 — Low (cosmetic / nice-to-fix)"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / Browser
      placeholder: "iPhone 15 Pro / Safari 17 · MacBook M1 / Chrome 120 · Pixel 8 / Chrome 121"
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or video (optional)
      description: Drag files here to attach. Short screen recordings are especially helpful for pose-detection bugs.

  - type: textarea
    id: console
    attributes:
      label: Console errors (optional)
      description: Open DevTools → Console and paste any red errors here.
      render: shell
